<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" id="metaTheme" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lap Splitter">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <title>Lap Splitter</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== THEME VARIABLES ===== */
    :root, [data-theme="dark"] {
      --bg-grad-1: #0f0f1a;
      --bg-grad-2: #1a1a2e;
      --bg-grad-3: #16213e;
      --text-primary: #fff;
      --text-body: #e8e8f0;
      --text-secondary: #ccc;
      --text-muted: #999;
      --text-faint: #666;
      --text-faintest: #555;
      --text-dim: #444;
      --text-subtitle: #888;
      --surface: #1a1a30;
      --surface-alt: #14142a;
      --surface-raised: #1a1a35;
      --input-bg: #1e1e32;
      --border: #2a2a45;
      --border-light: #222240;
      --border-row: #1a1a35;
      --slider-track: #2a2a3a;
      --slider-thumb: #fff;
      --slider-thumb-border: #333;
      --bar-label: #000;
      --bar-label-shadow: rgba(255,255,255,0.2);
      --card-shadow: rgba(0,0,0,0.15);
      --accent: #FF6B4A;
      --accent-bg: rgba(255,107,74,0.08);
      --accent-glow: rgba(255,107,74,0.1);
      --accent-lock-bg: rgba(255,107,74,0.07);
      --accent-blue: #4DC9F6;
      --accent-blue-bg: rgba(77,201,246,0.08);
      --accent-purple: #9B6DFF;
      --accent-purple-bg: rgba(155,109,255,0.08);
      --theme-meta: #0f0f1a;
    }

    [data-theme="light"] {
      --bg-grad-1: #f0f2f5;
      --bg-grad-2: #e8ecf1;
      --bg-grad-3: #dfe4eb;
      --text-primary: #1a1a2e;
      --text-body: #2c2c3e;
      --text-secondary: #444;
      --text-muted: #666;
      --text-faint: #888;
      --text-faintest: #999;
      --text-dim: #aaa;
      --text-subtitle: #777;
      --surface: #fff;
      --surface-alt: #f8f9fb;
      --surface-raised: #f0f1f4;
      --input-bg: #fff;
      --border: #d0d4dc;
      --border-light: #dde0e6;
      --border-row: #eef0f3;
      --slider-track: #d4d8e0;
      --slider-thumb: #fff;
      --slider-thumb-border: #bbb;
      --bar-label: #fff;
      --bar-label-shadow: rgba(0,0,0,0.25);
      --card-shadow: rgba(0,0,0,0.06);
      --accent: #E85A3A;
      --accent-bg: rgba(232,90,58,0.1);
      --accent-glow: rgba(232,90,58,0.12);
      --accent-lock-bg: rgba(232,90,58,0.08);
      --accent-blue: #2BA8D4;
      --accent-blue-bg: rgba(43,168,212,0.1);
      --accent-purple: #7C4DDB;
      --accent-purple-bg: rgba(124,77,219,0.1);
      --theme-meta: #f0f2f5;
    }

    /* ===== BASE STYLES ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(145deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
      color: var(--text-body);
      min-height: 100vh; min-height: 100dvh;
      padding: env(safe-area-inset-top) 20px 40px;
      max-width: 600px; margin: 0 auto;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
      transition: background 0.35s, color 0.35s;
    }
    input:focus, button:focus { outline: none; }
    button { -webkit-tap-highlight-color: transparent; }

    /* ===== HEADER ===== */
    .header { text-align: center; margin-bottom: 28px; padding-top: 16px; position: relative; }
    .header-top { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
    .title { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 0.15em; color: var(--text-primary); }
    .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.25em; color: var(--text-subtitle); }

    /* Theme toggle */
    .theme-toggle {
      position: absolute; top: 16px; right: 0;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; color: var(--text-muted);
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle svg { width: 18px; height: 18px; }

    /* ===== SECTIONS ===== */
    .section { margin-bottom: 24px; }
    .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--text-faint); font-weight: 600; margin-bottom: 10px; }

    /* ===== RACE SELECTOR ===== */
    .race-row { display: flex; gap: 8px; }
    .race-btn {
      flex: 1; padding: 12px 8px; border: 1.5px solid var(--border); border-radius: 10px;
      background: transparent; cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 2px; transition: all 0.25s;
    }
    .race-btn.active { border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 20px var(--accent-glow); }
    .race-btn-distance { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text-primary); transition: color 0.25s; }
    .race-btn.active .race-btn-distance { color: var(--accent); }
    .race-btn-detail { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); letter-spacing: 0.05em; }

    /* ===== GOAL ===== */
    .goal-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .lock-btn {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; padding: 5px 12px; border: 1.5px solid var(--text-dim);
      border-radius: 8px; background: transparent; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 0.25s; color: var(--text-faint);
    }
    .lock-btn.locked { border-color: var(--accent); color: var(--accent); background: var(--accent-lock-bg); }
    .lock-hint { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faintest); margin-bottom: 8px; font-style: italic; }
    .goal-row { display: flex; flex-direction: column; gap: 10px; }
    .goal-input-wrap { position: relative; display: inline-flex; align-items: center; }
    .goal-input {
      font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700;
      color: var(--text-primary); background: var(--input-bg); border: 2px solid var(--border); border-radius: 12px;
      padding: 10px 70px 10px 16px; width: 100%; max-width: 220px; transition: border-color 0.2s;
    }
    .goal-input:focus { border-color: var(--accent); }
    .goal-unit { position: absolute; right: 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-faintest); }
    .presets { display: flex; gap: 6px; flex-wrap: wrap; }
    .preset-btn {
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
      padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    }
    .preset-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ===== STRATEGY ===== */
    .strategy-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .strategy-btn {
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
      padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .strategy-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: var(--accent-blue-bg); }
    .strategy-icon { font-size: 16px; }
    .custom-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
      color: var(--accent-purple); background: var(--accent-purple-bg); padding: 4px 10px; border-radius: 6px;
      font-weight: 600; display: none;
    }
    .custom-badge.show { display: block; }

    /* ===== BAR ===== */
    .bar-container { display: flex; height: 52px; border-radius: 8px; overflow: visible; position: relative; cursor: col-resize; touch-action: none; }
    .bar-segment { display: flex; align-items: center; justify-content: center; position: relative; transition: opacity 0.2s; min-width: 20px; }
    .bar-label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      color: var(--bar-label); text-shadow: 0 1px 2px var(--bar-label-shadow); pointer-events: none; white-space: nowrap;
    }
    .bar-divider { position: absolute; right: -8px; top: -6px; bottom: -6px; width: 16px; cursor: col-resize; z-index: 10; touch-action: none; }
    .bar-markers { display: flex; justify-content: space-between; margin-top: 6px; }
    .marker-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.05em; }

    /* ===== LAP CARDS ===== */
    .lap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .lap-card {
      background: var(--surface); border-radius: 10px; padding: 14px 14px 12px;
      transition: all 0.25s ease; border-top: 3px solid;
      box-shadow: 0 2px 8px var(--card-shadow);
    }
    .lap-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .lap-dot { width: 8px; height: 8px; border-radius: 50%; }
    .lap-name { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
    .lap-dist { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faintest); margin-left: auto; }
    .lap-time-input {
      font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700;
      color: var(--text-primary); margin-bottom: 8px; letter-spacing: -0.02em;
      background: transparent; border: none; border-bottom: 2px solid transparent;
      width: 100%; padding: 0 0 2px 0; border-radius: 0;
      transition: border-color 0.2s;
    }
    .lap-time-input:focus { border-bottom-color: var(--accent); }
    .lap-slider {
      width: 100%; height: 6px; border-radius: 3px;
      -webkit-appearance: none; appearance: none; cursor: pointer; margin-bottom: 8px;
    }
    .lap-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: var(--slider-thumb); border: 2px solid var(--slider-thumb-border); cursor: pointer; margin-top: -9px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .lap-slider::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--slider-thumb); border: 2px solid var(--slider-thumb-border); cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .lap-meta { display: flex; justify-content: space-between; align-items: center; }
    .lap-pace { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); }
    .lap-cum { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faintest); }

    /* ===== TABLE ===== */
    .table { background: var(--surface-alt); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-light); }
    .table-header { display: flex; padding: 10px 14px; border-bottom: 1px solid var(--border-light); }
    .table-cell {
      flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint);
      letter-spacing: 0.08em; font-weight: 600; display: flex; align-items: center; gap: 6px;
    }
    .table-cell.narrow { flex: 0.8; }
    .table-row { display: flex; padding: 10px 14px; border-bottom: 1px solid var(--border-row); transition: background 0.15s; }
    .table-mono { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .table-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .table-total { display: flex; padding: 12px 14px; background: var(--surface-raised); }
    .table-bold { font-weight: 700; }

    /* ===== STOPWATCH ===== */
    .sw-display {
      font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700;
      color: var(--text-primary); text-align: center; margin-bottom: 8px;
      letter-spacing: -0.02em; line-height: 1;
    }
    .sw-lap-indicator {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--text-faintest); text-align: center; margin-bottom: 16px; letter-spacing: 0.1em;
    }
    .sw-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .sw-btn {
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
      padding: 14px 0; border: none; border-radius: 50px; cursor: pointer;
      transition: all 0.2s; flex: 1; max-width: 140px; text-align: center;
      letter-spacing: 0.03em;
    }
    .sw-btn-start { background: #22c55e; color: #fff; }
    .sw-btn-start:active { background: #16a34a; }
    .sw-btn-start.running { background: #ef4444; }
    .sw-btn-start.running:active { background: #dc2626; }
    .sw-btn-lap { background: var(--accent); color: #fff; }
    .sw-btn-lap:active { background: #e04e2e; }
    .sw-btn-lap:disabled { background: var(--border); color: var(--text-dim); cursor: default; }
    .sw-btn-reset { background: var(--surface); color: var(--text-muted); border: 1.5px solid var(--border); }
    .sw-btn-reset:active { background: var(--surface-raised); }
    .sw-btn-reset:disabled { color: var(--text-dim); cursor: default; }

    .sw-results { margin-top: 4px; }
    .sw-result-row {
      display: flex; align-items: center; padding: 10px 14px;
      border-bottom: 1px solid var(--border-row); gap: 8px;
    }
    .sw-result-row:last-child { border-bottom: none; }
    .sw-result-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sw-result-lap { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-secondary); width: 45px; }
    .sw-result-split { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .sw-result-target { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faintest); flex: 1; text-align: center; }
    .sw-result-diff {
      font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
      flex: 1; text-align: right;
    }
    .sw-diff-ahead { color: #22c55e; }
    .sw-diff-behind { color: #ef4444; }
    .sw-diff-even { color: var(--text-muted); }

    .sw-result-header {
      display: flex; padding: 8px 14px; border-bottom: 1px solid var(--border-light);
    }
    .sw-result-header span {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim);
      letter-spacing: 0.15em; font-weight: 600;
    }
    .sw-result-header .h-lap { width: 53px; }
    .sw-result-header .h-split { flex: 1; }
    .sw-result-header .h-target { flex: 1; text-align: center; }
    .sw-result-header .h-diff { flex: 1; text-align: right; }

    .sw-total-row {
      display: flex; align-items: center; padding: 12px 14px;
      background: var(--surface-raised); gap: 8px;
    }
    .sw-total-label { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-primary); width: 53px; }
    .sw-total-time { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; }
    .sw-total-target { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faintest); flex: 1; text-align: center; }
    .sw-total-diff { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; flex: 1; text-align: right; }

    .sw-empty {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
      text-align: center; padding: 20px 14px; font-style: italic;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="14" rx="12" ry="10" stroke="#FF6B4A" stroke-width="2.5" stroke-dasharray="4 3"/>
      <circle cx="14" cy="4" r="3" fill="#FF6B4A"/>
    </svg>
    <span class="title">LAP SPLITTER</span>
  </div>
  <div class="subtitle" id="subtitle"></div>
  <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
</div>

<div class="section">
  <div class="label">RACE DISTANCE</div>
  <div class="race-row" id="raceRow"></div>
</div>

<div class="section">
  <div class="goal-label-row">
    <div class="label" style="margin-bottom:0">GOAL TIME</div>
    <button type="button" class="lock-btn" id="lockBtn"></button>
  </div>
  <div class="lock-hint" id="lockHint"></div>
  <div class="goal-row">
    <div class="goal-input-wrap">
      <input class="goal-input" id="goalInput" placeholder="m:ss.00" inputmode="decimal" autocomplete="off">
      <span class="goal-unit">m:ss</span>
    </div>
    <div class="presets" id="presetsRow"></div>
  </div>
</div>

<div class="section">
  <div class="label">SPLIT STRATEGY</div>
  <div class="strategy-row" id="strategyRow"></div>
</div>

<div class="section">
  <div class="label">DRAG TO ADJUST SPLITS</div>
  <div class="bar-container" id="splitBar"></div>
  <div class="bar-markers" id="barMarkers"></div>
</div>

<div class="section">
  <div class="label">LAP TIMES</div>
  <div class="lap-grid" id="lapGrid"></div>
</div>

<div class="section">
  <div class="label">RACE SUMMARY</div>
  <div class="table">
    <div class="table-header">
      <span class="table-cell narrow">Lap</span>
      <span class="table-cell">Split</span>
      <span class="table-cell">Cumulative</span>
      <span class="table-cell">Pace/mi</span>
    </div>
    <div id="tableBody"></div>
    <div class="table-total" id="tableFoot"></div>
  </div>
</div>

<div class="section">
  <div class="label">STOPWATCH</div>
  <div class="sw-display" id="swDisplay">0:00.00</div>
  <div class="sw-lap-indicator" id="swLapIndicator">READY</div>
  <div class="sw-buttons">
    <button type="button" class="sw-btn sw-btn-reset" id="swReset" disabled>Reset</button>
    <button type="button" class="sw-btn sw-btn-start" id="swStart">Start</button>
    <button type="button" class="sw-btn sw-btn-lap" id="swLap" disabled>Lap</button>
  </div>
  <div class="table" id="swResultsContainer" style="display:none;">
    <div class="sw-result-header">
      <span class="h-lap">LAP</span>
      <span class="h-split">ACTUAL</span>
      <span class="h-target">TARGET</span>
      <span class="h-diff">+/-</span>
    </div>
    <div id="swResults"></div>
    <div id="swTotalRow" style="display:none;"></div>
  </div>
</div>

<script>
// ===== THEME =====
const sunSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const moonSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

function getTheme() {
  try { return localStorage.getItem('lap-splitter-theme') || 'dark'; } catch(e) { return 'dark'; }
}
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeToggle').innerHTML = theme === 'dark' ? sunSVG : moonSVG;
  document.getElementById('metaTheme').content = theme === 'dark' ? '#0f0f1a' : '#f0f2f5';
  try { localStorage.setItem('lap-splitter-theme', theme); } catch(e) {}
}

// Apply saved theme immediately
setTheme(getTheme());

document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(getTheme() === 'dark' ? 'light' : 'dark');
});

// ===== APP =====
const RACES = {
  400: { distance: 400, lapDist: 100, unit: '100m', defaultGoal: 52,
    presets: [{l:'0:48',s:48},{l:'0:52',s:52},{l:'0:56',s:56},{l:'1:00',s:60},{l:'1:05',s:65}],
    markers: ['0m','100m','200m','300m','400m'] },
  800: { distance: 800, lapDist: 200, unit: '200m', defaultGoal: 120,
    presets: [{l:'1:50',s:110},{l:'2:00',s:120},{l:'2:10',s:130},{l:'2:20',s:140},{l:'2:30',s:150}],
    markers: ['0m','200m','400m','600m','800m'] },
  1600: { distance: 1600, lapDist: 400, unit: '400m', defaultGoal: 300,
    presets: [{l:'4:00',s:240},{l:'4:30',s:270},{l:'5:00',s:300},{l:'5:30',s:330},{l:'6:00',s:360}],
    markers: ['0m','400m','800m','1200m','1600m'] }
};
const COLORS = ['#FF6B4A','#FFB84D','#4DC9F6','#9B6DFF'];

function fmt(t) {
  if (!t || t < 0) return '0:00.00';
  const m = Math.floor(t / 60), s = t % 60, ws = Math.floor(s), h = Math.round((s - ws) * 100);
  return m + ':' + String(ws).padStart(2,'0') + '.' + String(h).padStart(2,'0');
}
function parseT(str) {
  const c = str.replace(/[^0-9:.]/g, '');
  // If it has a colon or dot, parse normally
  if (c.includes(':') || c.includes('.')) {
    const p = c.split(':');
    if (p.length === 2) return (parseInt(p[0])||0)*60 + (parseFloat(p[1])||0);
    return parseFloat(c) || 0;
  }
  // Pure digits: treat as MMSSCC (pad to 6 from right)
  if (/^\d+$/.test(c) && c.length >= 3) {
    const padded = c.padStart(6, '0');
    const mins = parseInt(padded.slice(0, -4)) || 0;
    const secs = parseInt(padded.slice(-4, -2)) || 0;
    const hund = parseInt(padded.slice(-2)) || 0;
    return mins * 60 + secs + hund / 100;
  }
  return parseFloat(c) || 0;
}

let state = {
  raceKey: 1600, goalSeconds: 300, goalInput: '5:00.00',
  laps: [75,75,75,75], strategy: 'even', goalLocked: true
};

function race() { return RACES[state.raceKey]; }
function totalLaps() { return state.laps[0]+state.laps[1]+state.laps[2]+state.laps[3]; }
function cumulative() {
  const a = state.laps;
  return [a[0], a[0]+a[1], a[0]+a[1]+a[2], a[0]+a[1]+a[2]+a[3]];
}
function lapPace(t) { return fmt((t / race().lapDist) * 1609.34); }
function totalPace(t) { return fmt((t / race().distance) * 1609.34); }

function switchRace(key) {
  const r = RACES[key];
  state.raceKey = key;
  state.goalSeconds = r.defaultGoal;
  state.goalInput = fmt(r.defaultGoal);
  const b = r.defaultGoal / 4;
  state.laps = [b,b,b,b];
  state.strategy = 'even';
  state.goalLocked = true;
  swReset();
  buildUI();
}

function applyGoal(secs) {
  state.goalSeconds = secs;
  state.goalInput = fmt(secs);
  const b = secs / 4;
  state.laps = [b,b,b,b];
  state.strategy = 'even';
  updateUI();
}

function applyStrategy(type) {
  state.strategy = type;
  const avg = state.goalSeconds / 4;
  if (type === 'even') state.laps = [avg,avg,avg,avg];
  else if (type === 'negative') state.laps = [avg*1.08, avg*1.03, avg*0.97, avg*0.92];
  else if (type === 'positive') state.laps = [avg*0.92, avg*0.97, avg*1.03, avg*1.08];
  updateUI();
}

function handleLapChange(index, val) {
  if (state.goalLocked) {
    const clamped = Math.max(0.5, Math.min(state.goalSeconds - 1.5, val));
    const remaining = state.goalSeconds - clamped;
    const others = [0,1,2,3].filter(i => i !== index);
    const otherTotal = others.reduce((s,i) => s + state.laps[i], 0);
    state.laps[index] = clamped;
    if (otherTotal > 0) others.forEach(i => { state.laps[i] = (state.laps[i] / otherTotal) * remaining; });
    else others.forEach(i => { state.laps[i] = remaining / 3; });
  } else {
    state.laps[index] = Math.max(0.5, Math.min(600, val));
    state.goalSeconds = totalLaps();
    state.goalInput = fmt(state.goalSeconds);
  }
  state.strategy = 'custom';
  updateUI();
}

// ===== BUILD UI =====
function buildUI() {
  const r = race();
  document.getElementById('subtitle').textContent = r.distance + 'M \u00B7 4 LAPS \u00B7 ' + r.unit + ' EACH';

  let html = '';
  [400,800,1600].forEach(d => {
    html += '<button type="button" class="race-btn' + (state.raceKey===d?' active':'') + '" data-d="' + d + '">';
    html += '<span class="race-btn-distance">' + d + 'm</span>';
    html += '<span class="race-btn-detail">4 \u00D7 ' + RACES[d].lapDist + 'm</span></button>';
  });
  document.getElementById('raceRow').innerHTML = html;
  document.querySelectorAll('.race-btn').forEach(btn => {
    btn.addEventListener('click', () => switchRace(parseInt(btn.dataset.d)));
  });

  html = '';
  r.presets.forEach(p => {
    html += '<button type="button" class="preset-btn" data-s="' + p.s + '">' + p.l + '</button>';
  });
  document.getElementById('presetsRow').innerHTML = html;
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => applyGoal(parseInt(btn.dataset.s)));
  });

  html = '';
  [{k:'even',l:'Even',i:'\u2550'},{k:'negative',l:'Negative',i:'\u2197'},{k:'positive',l:'Positive',i:'\u2198'}].forEach(s => {
    html += '<button type="button" class="strategy-btn" data-s="' + s.k + '"><span class="strategy-icon">' + s.i + '</span><span>' + s.l + '</span></button>';
  });
  html += '<div class="custom-badge" id="customBadge">Custom</div>';
  document.getElementById('strategyRow').innerHTML = html;
  document.querySelectorAll('.strategy-btn').forEach(btn => {
    btn.addEventListener('click', () => applyStrategy(btn.dataset.s));
  });

  const oldLock = document.getElementById('lockBtn');
  const newLock = oldLock.cloneNode(false);
  oldLock.parentNode.replaceChild(newLock, oldLock);
  newLock.id = 'lockBtn'; newLock.type = 'button';
  newLock.addEventListener('click', () => { state.goalLocked = !state.goalLocked; updateUI(); });

  const oldGi = document.getElementById('goalInput');
  const newGi = oldGi.cloneNode(false);
  oldGi.parentNode.replaceChild(newGi, oldGi);
  newGi.id = 'goalInput';
  newGi.value = state.goalInput;
  newGi.addEventListener('input', e => { state.goalInput = e.target.value; });
  newGi.addEventListener('blur', () => {
    const s = parseT(state.goalInput);
    if (s >= 10 && s <= 1200) applyGoal(s);
  });
  newGi.addEventListener('keydown', e => { if (e.key === 'Enter') e.target.blur(); });

  html = '';
  r.markers.forEach(m => { html += '<span class="marker-text">' + m + '</span>'; });
  document.getElementById('barMarkers').innerHTML = html;

  html = '';
  for (let i = 0; i < 4; i++) {
    const br = i===0 ? 'border-radius:8px 0 0 8px;' : i===3 ? 'border-radius:0 8px 8px 0;' : '';
    html += '<div class="bar-segment" id="barSeg' + i + '" style="background:' + COLORS[i] + ';' + br + '">';
    html += '<span class="bar-label" id="barLbl' + i + '"></span>';
    if (i < 3) html += '<div class="bar-divider" data-idx="' + i + '"></div>';
    html += '</div>';
  }
  document.getElementById('splitBar').innerHTML = html;
  setupBarDrag(document.getElementById('splitBar'));

  html = '';
  for (let i = 0; i < 4; i++) {
    html += '<div class="lap-card" style="border-top-color:' + COLORS[i] + ';">';
    html += '<div class="lap-header"><div class="lap-dot" style="background:' + COLORS[i] + '"></div>';
    html += '<span class="lap-name">Lap ' + (i+1) + '</span>';
    html += '<span class="lap-dist" id="lapDist' + i + '">' + r.unit + '</span></div>';
    html += '<input class="lap-time-input" id="lapTime' + i + '" inputmode="decimal" autocomplete="off">';
    html += '<input type="range" class="lap-slider" id="lapSlider' + i + '" min="1" step="0.1">';
    html += '<div class="lap-meta"><span class="lap-pace" id="lapPace' + i + '"></span>';
    html += '<span class="lap-cum" id="lapCum' + i + '"></span></div></div>';
  }
  document.getElementById('lapGrid').innerHTML = html;
  for (let i = 0; i < 4; i++) {
    document.getElementById('lapSlider' + i).addEventListener('input', function() {
      handleLapChange(i, parseFloat(this.value));
    });
    const lapInput = document.getElementById('lapTime' + i);
    lapInput.addEventListener('focus', function() {
      this.select();
    });
    lapInput.addEventListener('blur', function() {
      const secs = parseT(this.value);
      if (secs > 0) handleLapChange(i, secs);
      else this.value = fmt(state.laps[i]);
    });
    lapInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') this.blur();
    });
  }

  html = '';
  for (let i = 0; i < 4; i++) {
    html += '<div class="table-row">';
    html += '<span class="table-cell narrow"><span class="table-dot" style="background:' + COLORS[i] + '"></span>' + (i+1) + '</span>';
    html += '<span class="table-cell table-mono" id="tSplit' + i + '"></span>';
    html += '<span class="table-cell table-mono" id="tCum' + i + '"></span>';
    html += '<span class="table-cell table-mono" id="tPace' + i + '"></span></div>';
  }
  document.getElementById('tableBody').innerHTML = html;
  document.getElementById('tableFoot').innerHTML =
    '<span class="table-cell narrow table-bold">Total</span>' +
    '<span class="table-cell table-mono table-bold" id="tTotal"></span>' +
    '<span class="table-cell"></span>' +
    '<span class="table-cell table-mono table-bold" id="tTotalPace"></span>';

  updateUI();
}

// ===== UPDATE UI =====
function updateUI() {
  const r = race(), g = state.goalSeconds, L = state.laps;
  const tl = totalLaps(), c = cumulative();
  const barTotal = state.goalLocked ? g : tl;

  const lb = document.getElementById('lockBtn');
  lb.className = 'lock-btn' + (state.goalLocked ? ' locked' : '');
  const lockPath = state.goalLocked
    ? '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'
    : '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
  lb.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' + lockPath + '</svg><span>' + (state.goalLocked ? 'Locked' : 'Unlocked') + '</span>';

  document.getElementById('lockHint').textContent = state.goalLocked
    ? 'Adjusting a lap redistributes time across other laps'
    : 'Adjusting a lap changes the total time freely';

  const gi = document.getElementById('goalInput');
  if (document.activeElement !== gi) gi.value = fmt(g);

  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.s) === g);
  });
  document.querySelectorAll('.strategy-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.s === state.strategy);
  });
  const cb = document.getElementById('customBadge');
  if (cb) cb.classList.toggle('show', state.strategy === 'custom');

  const sliderTrack = getComputedStyle(document.documentElement).getPropertyValue('--slider-track').trim();

  for (let i = 0; i < 4; i++) {
    document.getElementById('barSeg' + i).style.width = ((L[i] / barTotal) * 100) + '%';
    document.getElementById('barLbl' + i).textContent = fmt(L[i]);

    const lapTimeEl = document.getElementById('lapTime' + i);
    if (document.activeElement !== lapTimeEl) lapTimeEl.value = fmt(L[i]);
    document.getElementById('lapPace' + i).textContent = lapPace(L[i]) + '/mi';
    document.getElementById('lapCum' + i).textContent = '@ ' + fmt(c[i]);

    const sl = document.getElementById('lapSlider' + i);
    const slMax = state.goalLocked ? Math.max(g - 3, 4) : Math.max(g * 2, 60);
    sl.max = slMax;
    if (document.activeElement !== sl) sl.value = L[i];
    const fill = Math.min(100, Math.max(0, ((L[i] - 1) / (slMax - 1)) * 100));
    sl.style.background = 'linear-gradient(to right,' + COLORS[i] + ' 0%,' + COLORS[i] + ' ' + fill + '%,' + sliderTrack + ' ' + fill + '%,' + sliderTrack + ' 100%)';

    document.getElementById('tSplit' + i).textContent = fmt(L[i]);
    document.getElementById('tCum' + i).textContent = fmt(c[i]);
    document.getElementById('tPace' + i).textContent = lapPace(L[i]);
  }

  document.getElementById('tTotal').textContent = fmt(tl);
  document.getElementById('tTotalPace').textContent = totalPace(tl);
}

// ===== BAR DRAG =====
function setupBarDrag(barEl) {
  for (let idx = 0; idx < 3; idx++) {
    const divider = barEl.querySelector('.bar-divider[data-idx="' + idx + '"]');
    if (!divider) continue;
    const start = (e) => {
      e.preventDefault();
      const rect = barEl.getBoundingClientRect();
      const w = rect.width;
      const dragTotal = state.goalLocked ? state.goalSeconds : totalLaps();
      const move = (ev) => {
        ev.preventDefault();
        const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
        const frac = Math.max(0.02, Math.min(0.98, (cx - rect.left) / w));
        const prev = state.laps.slice(0, idx).reduce((a,b) => a+b, 0);
        const nextEnd = state.laps.slice(0, idx+2).reduce((a,b) => a+b, 0);
        const nv = frac * dragTotal - prev;
        if (nv >= 2 && nextEnd - prev - nv >= 2) {
          const delta = nv - state.laps[idx];
          state.laps[idx] = nv;
          state.laps[idx+1] -= delta;
          state.strategy = 'custom';
          updateUI();
        }
      };
      const up = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', up);
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, {passive: false});
      document.addEventListener('touchend', up);
    };
    divider.addEventListener('mousedown', start);
    divider.addEventListener('touchstart', start, {passive: false});
  }
}

// ===== STOPWATCH =====
let sw = { running: false, startTime: 0, elapsed: 0, lapTimes: [], rafId: null };

function fmtSw(ms) {
  const totalSecs = ms / 1000;
  const m = Math.floor(totalSecs / 60);
  const s = totalSecs % 60;
  const ws = Math.floor(s);
  const h = Math.floor((s - ws) * 100);
  return m + ':' + String(ws).padStart(2,'0') + '.' + String(h).padStart(2,'0');
}

function fmtDiff(diffSecs) {
  const sign = diffSecs >= 0 ? '+' : '-';
  const abs = Math.abs(diffSecs);
  const m = Math.floor(abs / 60);
  const s = abs % 60;
  const ws = Math.floor(s);
  const h = Math.round((s - ws) * 100);
  if (m > 0) return sign + m + ':' + String(ws).padStart(2,'0') + '.' + String(h).padStart(2,'0');
  return sign + ws + '.' + String(h).padStart(2,'0');
}

function swTick() {
  if (!sw.running) return;
  sw.elapsed = performance.now() - sw.startTime;
  document.getElementById('swDisplay').textContent = fmtSw(sw.elapsed);
  sw.rafId = requestAnimationFrame(swTick);
}

function swStart() {
  const btn = document.getElementById('swStart');
  const lapBtn = document.getElementById('swLap');
  const resetBtn = document.getElementById('swReset');

  if (!sw.running) {
    // Start or resume
    sw.startTime = performance.now() - sw.elapsed;
    sw.running = true;
    btn.textContent = 'Stop';
    btn.classList.add('running');
    lapBtn.disabled = false;
    resetBtn.disabled = true;
    if (sw.lapTimes.length === 0) {
      document.getElementById('swLapIndicator').textContent = 'LAP 1 OF 4';
    }
    swTick();
  } else {
    // Stop
    sw.running = false;
    cancelAnimationFrame(sw.rafId);
    btn.textContent = 'Resume';
    btn.classList.remove('running');
    lapBtn.disabled = true;
    resetBtn.disabled = false;
  }
}

function swLapClick() {
  if (!sw.running || sw.lapTimes.length >= 4) return;

  const lapIndex = sw.lapTimes.length;
  const currentElapsed = performance.now() - sw.startTime;
  const prevElapsed = sw.lapTimes.length > 0 ? sw.lapTimes[sw.lapTimes.length - 1].cumMs : 0;
  const lapMs = currentElapsed - prevElapsed;

  sw.lapTimes.push({ lapMs: lapMs, cumMs: currentElapsed });
  renderSwResults();

  // Update lap indicator
  if (sw.lapTimes.length < 4) {
    document.getElementById('swLapIndicator').textContent = 'LAP ' + (sw.lapTimes.length + 1) + ' OF 4';
  }

  // Auto-stop after 4 laps
  if (sw.lapTimes.length >= 4) {
    sw.running = false;
    cancelAnimationFrame(sw.rafId);
    sw.elapsed = currentElapsed;
    document.getElementById('swDisplay').textContent = fmtSw(currentElapsed);
    document.getElementById('swLapIndicator').textContent = 'FINISHED';

    const btn = document.getElementById('swStart');
    btn.textContent = 'Done';
    btn.classList.remove('running');
    btn.disabled = true;
    document.getElementById('swLap').disabled = true;
    document.getElementById('swReset').disabled = false;
  }
}

function swReset() {
  sw.running = false;
  cancelAnimationFrame(sw.rafId);
  sw.elapsed = 0;
  sw.lapTimes = [];

  document.getElementById('swDisplay').textContent = '0:00.00';
  document.getElementById('swLapIndicator').textContent = 'READY';

  const btn = document.getElementById('swStart');
  btn.textContent = 'Start';
  btn.classList.remove('running');
  btn.disabled = false;
  document.getElementById('swLap').disabled = true;
  document.getElementById('swReset').disabled = true;

  document.getElementById('swResultsContainer').style.display = 'none';
  document.getElementById('swResults').innerHTML = '';
  document.getElementById('swTotalRow').style.display = 'none';
}

function renderSwResults() {
  const container = document.getElementById('swResultsContainer');
  const resultsDiv = document.getElementById('swResults');
  const totalRowDiv = document.getElementById('swTotalRow');
  container.style.display = 'block';

  let html = '';
  let cumPlan = 0;

  for (let i = 0; i < sw.lapTimes.length; i++) {
    const actual = sw.lapTimes[i].lapMs / 1000;
    const target = state.laps[i];
    const diff = actual - target;
    cumPlan += target;
    const cumDiff = (sw.lapTimes[i].cumMs / 1000) - cumPlan;

    const diffClass = diff < -0.05 ? 'sw-diff-ahead' : diff > 0.05 ? 'sw-diff-behind' : 'sw-diff-even';

    html += '<div class="sw-result-row">';
    html += '<div class="sw-result-dot" style="background:' + COLORS[i] + '"></div>';
    html += '<div class="sw-result-lap">Lap ' + (i+1) + '</div>';
    html += '<div class="sw-result-split">' + fmtSw(sw.lapTimes[i].lapMs) + '</div>';
    html += '<div class="sw-result-target">' + fmt(target) + '</div>';
    html += '<div class="sw-result-diff ' + diffClass + '">' + fmtDiff(diff) + '</div>';
    html += '</div>';
  }
  resultsDiv.innerHTML = html;

  // Show total row if all 4 laps done
  if (sw.lapTimes.length >= 4) {
    const totalActual = sw.lapTimes[3].cumMs;
    const totalTarget = state.laps[0] + state.laps[1] + state.laps[2] + state.laps[3];
    const totalDiff = (totalActual / 1000) - totalTarget;
    const totalClass = totalDiff < -0.05 ? 'sw-diff-ahead' : totalDiff > 0.05 ? 'sw-diff-behind' : 'sw-diff-even';

    totalRowDiv.style.display = 'flex';
    totalRowDiv.className = 'sw-total-row';
    totalRowDiv.innerHTML =
      '<div class="sw-total-label">Total</div>' +
      '<div class="sw-total-time">' + fmtSw(totalActual) + '</div>' +
      '<div class="sw-total-target">' + fmt(totalTarget) + '</div>' +
      '<div class="sw-total-diff ' + totalClass + '">' + fmtDiff(totalDiff) + '</div>';
  }
}

document.getElementById('swStart').addEventListener('click', swStart);
document.getElementById('swLap').addEventListener('click', swLapClick);
document.getElementById('swReset').addEventListener('click', swReset);

// ===== INIT =====
buildUI();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
