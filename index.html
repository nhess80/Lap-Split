<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clearing Cache...</title>
  <style>
    body { background: #0f0f1a; color: #fff; font-family: system-ui; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .msg { font-size: 18px; }
    .done { color: #4DC9F6; }
    a { color: #FF6B4A; }
  </style>
</head>
<body>
  <div>
    <div class="msg" id="status">Clearing old caches...</div>
  </div>
  <script>
    async function clearEverything() {
      var status = document.getElementById('status');
      try {
        // Unregister ALL service workers
        if ('serviceWorker' in navigator) {
          var registrations = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < registrations.length; i++) {
            await registrations[i].unregister();
          }
          status.textContent = 'Removed ' + registrations.length + ' service worker(s)...';
        }
        // Delete ALL caches
        if ('caches' in window) {
          var names = await caches.keys();
          for (var i = 0; i < names.length; i++) {
            await caches.delete(names[i]);
          }
        }
        status.innerHTML = '<span class="done">All clear!</span><br><br>Redirecting to app...';
        setTimeout(function() {
          window.location.href = './index.html';
        }, 1500);
      } catch(e) {
        status.innerHTML = 'Error: ' + e.message + '<br><br><a href="./index.html">Go to app manually</a>';
      }
    }
    clearEverything();
  </script>
</body>
</html>
